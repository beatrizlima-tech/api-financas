spring:
  application:
    name: api-financas

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  rabbitmq:
    listener:
      simple:
        auto-startup: false


server:
  port: 8083
